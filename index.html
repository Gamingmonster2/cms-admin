<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>لوحة التحكم</title></head>
<body>
    <input type="text" id="title" placeholder="عنوان المقال"><br>
    <textarea id="content" placeholder="محتوى المقال"></textarea><br>
    <input type="password" id="pat" placeholder="GitHub Token"><br>
    <button onclick="savePost()">حفظ ونشر</button>

    <script>
        async function savePost() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const pat = document.getElementById('pat').value;
            const GIST_ID = '88c35a33f7886600d2f43f51f4f8601c';

            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${pat}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    files: {
                        'database.json': {
                            content: JSON.stringify({ posts: [{ id: 1, title: title, content: content, date: new Date().toISOString() }] })
                        }
                    }
                })
            });
            response.ok ? alert('تم النشر بنجاح!') : alert('فشل النشر');
        }
    </script>
</body>
</html>
