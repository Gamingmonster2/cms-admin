<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>لوحة التحكم المطورة</title></head>
<body>
    <h1>إدارة المقالات</h1>
    <input type="text" id="title" placeholder="العنوان"><br>
    <textarea id="content" placeholder="المحتوى"></textarea><br>
    <input type="password" id="pat" placeholder="GitHub Token"><br>
    <button onclick="addPost()">إضافة مقال جديد</button>
    <hr>
    <div id="posts-list">جاري تحميل المقالات...</div>

    <script>
        const GIST_ID = '88c35a33f7886600d2f43f51f4f8601c';
        let posts = [];

        async function loadPosts() {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`);
            const data = await res.json();
            posts = JSON.parse(data.files['database.json'].content).posts;
            document.getElementById('posts-list').innerHTML = posts.map((p, i) => `
                <div>
                    <h3>${p.title}</h3>
                    <button onclick="deletePost(${i})">حذف</button>
                </div>
            `).join('');
        }

        async function addPost() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            posts.push({ title, content, date: new Date().toISOString() });
            saveToGist();
        }

        async function deletePost(index) {
            posts.splice(index, 1);
            saveToGist();
        }

        async function saveToGist() {
            const pat = document.getElementById('pat').value;
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${pat}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ files: { 'database.json': { content: JSON.stringify({ posts }) } } })
            });
            res.ok ? (alert('تم التحديث!'), loadPosts()) : alert('خطأ في النشر');
        }

        loadPosts();
    </script>
</body>
</html>
